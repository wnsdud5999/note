<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shared Firebase Notes</title>
    <style>
      :root {
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        color: #e4e7ec;
      }
      body { margin: 0; background: #0b1220; }
      .container { max-width: 1180px; margin: 28px auto; padding: 0 16px; }
      .card {
        background: #101828;
        border: 1px solid #1d2939;
        border-radius: 14px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
        padding: 18px;
      }
      h1, h2, h3 { margin: 0 0 10px; }
      .hidden { display: none; }
      .row { display: flex; gap: 10px; align-items: center; margin-top: 12px; flex-wrap: wrap; }
      input, textarea, button {
        border: 1px solid #344054;
        border-radius: 10px;
        padding: 10px 12px;
        font-size: 0.92rem;
      }
      input, textarea {
        color: #f2f4f7;
        background: #0c111d;
      }
      button { background: #6941c6; color: #fff; border-color: #6941c6; cursor: pointer; }
      button.secondary { background: #1d2939; color: #d0d5dd; border-color: #344054; }
      button.danger { background: #b42318; border-color: #b42318; }
      textarea { width: 100%; min-height: 420px; box-sizing: border-box; resize: vertical; }
      .status { font-size: 0.9rem; color: #98a2b3; }
      #loginCard { max-width: 430px; margin: 90px auto; }
      .appGrid { display: grid; grid-template-columns: 300px 1fr; gap: 14px; }
      .panel { border: 1px solid #1d2939; border-radius: 12px; padding: 12px; background: #0c111d; }
      .noteList { list-style: none; padding: 0; margin: 0; max-height: 460px; overflow: auto; }
      .noteList li { display: flex; justify-content: space-between; gap: 8px; padding: 8px; border-radius: 8px; cursor: pointer; }
      .noteList li.active { background: #1d2939; }
      .noteList small { color: #98a2b3; display: block; }
      .commits { margin-top: 12px; border-top: 1px solid #1d2939; padding-top: 12px; }
      .commits ul { list-style: none; margin: 0; padding: 0; }
      .commits li { margin: 8px 0; font-size: 0.9rem; color: #d0d5dd; }
      ::placeholder { color: #98a2b3; }
      @media (max-width: 900px) {
        .appGrid { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div id="loginCard" class="card">
        <h1>Enter shared password</h1>
        <p class="status">This signs into one shared Firebase account for your team.</p>
        <div class="row">
          <input id="passwordInput" type="password" placeholder="Password" style="flex: 1" />
          <button id="loginBtn">Unlock</button>
        </div>
        <p id="loginStatus" class="status"></p>
      </div>

      <div id="appCard" class="card hidden">
        <div class="row" style="justify-content: space-between; margin-top: 0">
          <h1>Shared notes</h1>
          <button id="logoutBtn" class="secondary">Logout</button>
        </div>
        <p id="appStatus" class="status">Connected.</p>

        <div class="appGrid">
          <div class="panel">
            <div class="row" style="margin-top: 0">
              <h3 style="margin: 0">Notes</h3>
              <button id="newNoteBtn" class="secondary">+ New note</button>
            </div>
            <ul id="noteList" class="noteList"></ul>
          </div>

          <div class="panel">
            <input id="noteTitleInput" placeholder="Note title" style="width: 100%; box-sizing: border-box" />
            <textarea id="editor" placeholder="Write here..."></textarea>

            <div class="row">
              <input id="authorInput" placeholder="Your name (optional)" />
              <input id="messageInput" placeholder="Commit message (optional)" style="flex: 1" />
              <button id="commitBtn">Commit changes</button>
              <button id="deleteNoteBtn" class="danger">Delete note</button>
            </div>

            <div class="commits">
              <h3>Recent commits (selected note)</h3>
              <ul id="commitList"></ul>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
