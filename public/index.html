<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shared Text Editor</title>
    <style>
      :root {
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        color: #101828;
      }
      body {
        margin: 0;
        background: #f2f4f7;
      }
      .container {
        max-width: 960px;
        margin: 24px auto;
        padding: 0 16px;
      }
      .card {
        background: white;
        border-radius: 16px;
        box-shadow: 0 8px 24px rgba(16, 24, 40, 0.08);
        padding: 18px;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 1.3rem;
      }
      textarea {
        width: 100%;
        min-height: 420px;
        border: 1px solid #d0d5dd;
        border-radius: 12px;
        padding: 12px;
        resize: vertical;
        font-size: 0.95rem;
        line-height: 1.45;
        box-sizing: border-box;
      }
      .row {
        display: flex;
        gap: 10px;
        align-items: center;
        margin-top: 12px;
        flex-wrap: wrap;
      }
      input,
      button {
        border: 1px solid #d0d5dd;
        border-radius: 10px;
        padding: 10px 12px;
        font-size: 0.92rem;
      }
      button {
        border-color: #6941c6;
        background: #6941c6;
        color: white;
        cursor: pointer;
      }
      button.secondary {
        background: white;
        color: #344054;
        border-color: #d0d5dd;
      }
      .status {
        color: #475467;
        font-size: 0.9rem;
      }
      .commits {
        margin-top: 14px;
        padding-top: 10px;
        border-top: 1px solid #eaecf0;
        font-size: 0.88rem;
        color: #475467;
      }
      .commits li {
        margin: 6px 0;
      }
      .hidden {
        display: none;
      }
      #loginCard {
        max-width: 420px;
        margin: 80px auto;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div id="loginCard" class="card">
        <h1>Enter password</h1>
        <div class="row">
          <input id="passwordInput" type="password" placeholder="Password" style="flex: 1" />
          <button id="loginBtn">Unlock</button>
        </div>
        <p id="loginStatus" class="status"></p>
      </div>

      <div id="editorCard" class="card hidden">
        <h1>Shared text document</h1>
        <textarea id="editor" placeholder="Write here..."></textarea>
        <div class="row">
          <input id="authorInput" placeholder="Your name (optional)" />
          <input id="messageInput" placeholder="Commit message (optional)" style="flex: 1" />
          <button id="commitBtn">Commit changes</button>
          <button id="logoutBtn" class="secondary">Logout</button>
        </div>
        <p id="editorStatus" class="status"></p>
        <div class="commits">
          <strong>Recent commits</strong>
          <ul id="commitList"></ul>
        </div>
      </div>
    </div>

    <script src="/main.js"></script>
  </body>
</html>
